<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grafana Cloud ダッシュボード提案ツール</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1218;
      --panel: #171b24;
      --panel-2: #1d2430;
      --text: #edf2f7;
      --muted: #9aa7b8;
      --line: #2b3444;
      --accent: #ff8a2a;
      --accent-2: #4aa3ff;
      --ok: #2fbf71;
      --danger: #ff5c7a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", Meiryo, sans-serif;
      letter-spacing: 0;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
    }

    aside {
      border-right: 1px solid var(--line);
      background: #111720;
      padding: 24px;
    }

    main {
      padding: 24px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 22px;
      line-height: 1.35;
      font-weight: 700;
    }

    h2 {
      margin: 0;
      font-size: 17px;
    }

    label {
      display: block;
      margin: 16px 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #0d1118;
      color: var(--text);
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
      min-height: 40px;
    }

    textarea { resize: vertical; min-height: 72px; }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      min-height: 40px;
      color: #111827;
      background: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
    }

    button.danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(255, 92, 122, 0.45);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
    }

    .stack { display: grid; gap: 12px; }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .check-row input {
      width: 18px;
      height: 18px;
      min-height: 18px;
      accent-color: var(--accent);
    }

    .status {
      margin-top: 18px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0d1118;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .status a {
      color: var(--accent-2);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .status.ok { border-color: rgba(47, 191, 113, 0.5); color: #baf4d1; }
    .status.error { border-color: rgba(255, 92, 122, 0.5); color: #ffc2cc; }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .panel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 14px;
    }

    .preview {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0b0f16;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .preview-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .preview-board {
      display: grid;
      grid-template-columns: repeat(24, minmax(0, 1fr));
      grid-auto-rows: 24px;
      gap: 8px;
      min-height: 260px;
    }

    .preview-panel {
      border: 1px solid #2f3745;
      border-radius: 7px;
      background: #151a20;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
      min-width: 0;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .preview-title {
      font-weight: 700;
      font-size: 13px;
      color: #dbe7ff;
      padding: 10px 12px 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-body {
      position: relative;
      min-height: 0;
      padding: 4px 12px 6px;
    }

    .preview-meta {
      color: var(--muted);
      font-size: 11px;
      border-top: 1px solid #2a3340;
      padding: 6px 12px 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-chart,
    .preview-gauge,
    .preview-donut,
    .preview-table {
      width: 100%;
      height: 100%;
      min-height: 96px;
    }

    .preview-stat {
      height: 100%;
      min-height: 96px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #4ea247, #f0d400 65%, #ff8a2a);
      color: #10151d;
      font-size: clamp(28px, 6vw, 58px);
      line-height: 1;
      font-weight: 700;
    }

    .preview-table {
      border-collapse: collapse;
      color: #c5cfdd;
      font-size: 11px;
    }

    .preview-table th,
    .preview-table td {
      border-bottom: 1px solid #29323f;
      padding: 4px 6px;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 130px;
    }

    .panel-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .meta.two {
      grid-template-columns: repeat(2, 1fr);
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 32px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
    }

    a { color: var(--accent-2); }

    @media (max-width: 840px) {
      .app { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); }
      .toolbar { align-items: stretch; flex-direction: column; }
      .meta, .meta.two { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>Grafana Cloud<br>ダッシュボード提案ツール</h1>

      <label for="industry">業種欄向けのダッシュボードを作成してください。</label>
      <input id="industry" value="板金加工業者" placeholder="例: 板金加工業者">

      <label for="dashboardType">ダッシュボード種別</label>
      <select id="dashboardType">
        <option value="manufacturing">製造ライン・設備保全</option>
        <option value="iot">IoTデバイス監視</option>
      </select>

      <label for="folderUid">Dashboard folder</label>
      <select id="folderUid">
        <option value="">General / ルート</option>
      </select>

      <div class="actions">
        <button id="propose">パネル案作成</button>
        <button id="create" class="secondary" disabled>Grafana Cloud に作成</button>
      </div>
      <label class="check-row" for="overwriteDashboard">
        <input id="overwriteDashboard" type="checkbox">
        既存ダッシュボードを上書きする
      </label>

      <div id="status" class="status">業種を入力してパネル案を作成してください。</div>
    </aside>

    <main>
      <section class="toolbar">
        <div>
          <h2 id="dashboardName">パネル案</h2>
          <div id="dashboardMeta" class="status">未作成</div>
        </div>
        <button id="addPanel" class="secondary" disabled>+ パネル追加</button>
      </section>

      <section class="preview">
        <div class="preview-head">
          <h2>生成前プレビュー</h2>
          <span id="previewSummary">パネル案作成後に表示されます</span>
        </div>
        <div id="previewBoard" class="preview-board">
          <div class="empty" style="grid-column: span 24;">ダッシュボード作成前にレイアウトを確認できます。</div>
        </div>
      </section>

      <section id="panels" class="panel-grid">
        <div class="empty">ここにAI提案されたパネル案が表示されます。</div>
      </section>
    </main>
  </div>

  <script>
    const state = {
      proposal: null,
      panels: [],
      folders: []
    };

    const $ = (id) => document.getElementById(id);

    function setStatus(message, kind = "") {
      const el = $("status");
      el.className = `status ${kind}`;
      el.textContent = message;
    }

    async function api(path, payload) {
      if (window.location.protocol === "file:") {
        throw new Error("この画面は http://localhost:4173/ から開いてください。file:// で直接開くとローカルAPIに接続できません。");
      }
      const response = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await response.json();
      if (!response.ok || data.ok === false) {
        throw new Error(data.error || "Request failed");
      }
      return data;
    }

    async function apiGet(path) {
      if (window.location.protocol === "file:") {
        throw new Error("この画面は http://localhost:4173/ から開いてください。file:// で直接開くとローカルAPIに接続できません。");
      }
      const response = await fetch(path);
      const data = await response.json();
      if (!response.ok || data.ok === false) {
        throw new Error(data.error || "Request failed");
      }
      return data;
    }

    async function loadFolders() {
      try {
        const data = await apiGet("/api/folders");
        state.folders = data.folders || [];
        $("folderUid").innerHTML = state.folders
          .map((folder) => `<option value="${escapeHtml(folder.uid)}">${escapeHtml(folder.title)}</option>`)
          .join("");
      } catch (error) {
        $("folderUid").innerHTML = '<option value="">General / ルート</option>';
        setStatus(`Dashboard folder の取得に失敗しました。General / ルートに作成します。\n${error.message}`, "error");
      }
    }

    function renderMeta() {
      if (!state.proposal) {
        $("dashboardName").textContent = "パネル案";
        $("dashboardMeta").textContent = "未作成";
        return;
      }
      const label = state.proposal.dashboardType === "iot" ? "IoTデバイス監視ダッシュボード" : "保全用ダッシュボード";
      $("dashboardName").textContent = `${state.proposal.industry} ${label}`;
      const url = `https://ytsutsumi30.grafana.net/d/${state.proposal.dashboardUid}/${state.proposal.dashboardSlug}`;
      const folderTitle = $("folderUid").selectedOptions[0]?.textContent || "General / ルート";
      $("dashboardMeta").innerHTML =
        `名前: ${escapeHtml(state.proposal.dashboardUid)}\nFolder: ${escapeHtml(folderTitle)}\nURL: <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(url)}</a>`;
    }

    function updatePanel(index, key, value) {
      if (key === "min" || key === "max" || key === "warningThreshold" || key === "criticalThreshold") {
        state.panels[index][key] = Number(value);
      } else if (key === "latestOnly") {
        state.panels[index][key] = value;
      } else {
        state.panels[index][key] = value;
      }
      renderPreview();
    }

    function previewSize(panel) {
      const isSmall = panel.visualization === "stat" || panel.visualization === "gauge";
      const isWide = panel.visualization === "timeseries" && String(panel.title).toLowerCase().includes("trend");
      return isWide ? { w: 24, h: 9 } : isSmall ? { w: 8, h: 5 } : { w: 12, h: 8 };
    }

    function previewPositions(panels) {
      let x = 0;
      let y = 1;
      let rowHeight = 0;
      return panels.map((panel) => {
        const size = previewSize(panel);
        if (x + size.w > 24) {
          x = 0;
          y += rowHeight;
          rowHeight = 0;
        }
        const grid = { ...size, x, y };
        x += size.w;
        rowHeight = Math.max(rowHeight, size.h);
        return grid;
      });
    }

    function formatValue(value, unit) {
      const number = Number(value);
      if (!Number.isFinite(number)) return "";
      const digits = Math.abs(number) < 1 ? 3 : Math.abs(number) < 100 ? 1 : 0;
      const label = number.toFixed(digits);
      const unitLabel = unit === "celsius" ? "°C" : unit === "percent" ? "%" : unit === "kwatt" ? "kW" : unit === "amp" ? "A" : unit === "dB" ? "dB" : unit === "s" ? "s" : unit || "";
      return `${label} ${unitLabel}`.trim();
    }

    function seededValue(seed, index) {
      const x = Math.sin((seed + 1) * 12.9898 + index * 78.233) * 43758.5453;
      return x - Math.floor(x);
    }

    function sampleSeries(panel, count = 48) {
      const min = Number(panel.min);
      const max = Number(panel.max);
      const lo = Number.isFinite(min) ? min : 0;
      const hi = Number.isFinite(max) && max > lo ? max : lo + 100;
      const span = hi - lo;
      let current = lo + span * (0.45 + seededValue(panel.title?.length || 3, 0) * 0.2);
      return Array.from({ length: count }, (_, index) => {
        current += (seededValue(panel.title?.length || 3, index) - 0.5) * span * 0.08;
        current = Math.max(lo + span * 0.08, Math.min(hi - span * 0.06, current));
        return current;
      });
    }

    function renderTimeSeriesPreview(panel) {
      const values = sampleSeries(panel);
      const min = Number(panel.min);
      const max = Number(panel.max);
      const lo = Number.isFinite(min) ? min : Math.min(...values);
      const hi = Number.isFinite(max) && max > lo ? max : Math.max(...values);
      const width = 420;
      const height = 170;
      const plot = { left: 36, top: 14, right: 8, bottom: 34 };
      const innerW = width - plot.left - plot.right;
      const innerH = height - plot.top - plot.bottom;
      const points = values.map((value, index) => {
        const x = plot.left + (index / (values.length - 1)) * innerW;
        const y = plot.top + (1 - (value - lo) / (hi - lo)) * innerH;
        return [x, y];
      });
      const line = points.map(([x, y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join(" ");
      const area = `${plot.left},${plot.top + innerH} ${line} ${plot.left + innerW},${plot.top + innerH}`;
      const last = values[values.length - 1];
      const mean = values.reduce((sum, value) => sum + value, 0) / values.length;
      return `
        <svg class="preview-chart" viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" aria-hidden="true">
          <defs>
            <pattern id="grid-${Math.abs(panel.title?.length || 1)}" width="52" height="32" patternUnits="userSpaceOnUse">
              <path d="M 52 0 L 0 0 0 32" fill="none" stroke="#2a3340" stroke-width="1"/>
            </pattern>
          </defs>
          <rect x="${plot.left}" y="${plot.top}" width="${innerW}" height="${innerH}" fill="url(#grid-${Math.abs(panel.title?.length || 1)})"/>
          <text x="2" y="${plot.top + 8}" fill="#c6cfdd" font-size="11">${escapeHtml(formatValue(hi, panel.unit))}</text>
          <text x="2" y="${plot.top + innerH}" fill="#c6cfdd" font-size="11">${escapeHtml(formatValue(lo, panel.unit))}</text>
          <polygon points="${area}" fill="rgba(87, 148, 91, 0.24)"></polygon>
          <polyline points="${line}" fill="none" stroke="#7bc96f" stroke-width="2"></polyline>
          <line x1="${plot.left}" y1="${plot.top + innerH}" x2="${plot.left + innerW}" y2="${plot.top + innerH}" stroke="#2a3340"/>
          <text x="${plot.left}" y="${height - 12}" fill="#7da6f8" font-size="11">Name</text>
          <text x="${width - 132}" y="${height - 12}" fill="#7da6f8" font-size="11">Last *</text>
          <text x="${width - 82}" y="${height - 12}" fill="#7da6f8" font-size="11">Mean</text>
          <text x="${width - 34}" y="${height - 12}" fill="#7da6f8" font-size="11">Max</text>
          <text x="${plot.left}" y="${height - 1}" fill="#c6cfdd" font-size="10">${escapeHtml(panel.title)}</text>
          <text x="${width - 132}" y="${height - 1}" fill="#c6cfdd" font-size="10">${escapeHtml(formatValue(last, panel.unit))}</text>
          <text x="${width - 82}" y="${height - 1}" fill="#c6cfdd" font-size="10">${escapeHtml(formatValue(mean, panel.unit))}</text>
          <text x="${width - 34}" y="${height - 1}" fill="#c6cfdd" font-size="10">${escapeHtml(formatValue(hi, panel.unit))}</text>
        </svg>
      `;
    }

    function renderGaugePreview(panel) {
      const min = Number(panel.min);
      const max = Number(panel.max);
      const lo = Number.isFinite(min) ? min : 0;
      const hi = Number.isFinite(max) && max > lo ? max : lo + 100;
      const value = lo + (hi - lo) * 0.62;
      return `
        <svg class="preview-gauge" viewBox="0 0 260 150" aria-hidden="true">
          <path d="M45 120 A85 85 0 0 1 215 120" fill="none" stroke="#343b46" stroke-width="16"/>
          <path d="M45 120 A85 85 0 0 1 142 39" fill="none" stroke="#98d86b" stroke-width="16"/>
          <path d="M142 39 A85 85 0 0 1 199 78" fill="none" stroke="#f4dc26" stroke-width="16"/>
          <path d="M199 78 A85 85 0 0 1 215 120" fill="none" stroke="#ff6b57" stroke-width="16"/>
          <text x="130" y="94" text-anchor="middle" fill="#dbe7ff" font-size="20">${escapeHtml(formatValue(value, panel.unit))}</text>
          <text x="130" y="116" text-anchor="middle" fill="#7bc96f" font-size="10">current</text>
        </svg>
      `;
    }

    function renderDonutPreview(panel) {
      return `
        <svg class="preview-donut" viewBox="0 0 260 150" aria-hidden="true">
          <circle cx="80" cy="76" r="44" fill="none" stroke="#68b36b" stroke-width="18" stroke-dasharray="155 276" transform="rotate(-90 80 76)"/>
          <circle cx="80" cy="76" r="44" fill="none" stroke="#f2c230" stroke-width="18" stroke-dasharray="72 276" stroke-dashoffset="-155" transform="rotate(-90 80 76)"/>
          <circle cx="80" cy="76" r="44" fill="none" stroke="#55a6f7" stroke-width="18" stroke-dasharray="49 276" stroke-dashoffset="-227" transform="rotate(-90 80 76)"/>
          <text x="150" y="48" fill="#c6cfdd" font-size="12">Category A 56%</text>
          <text x="150" y="74" fill="#c6cfdd" font-size="12">Category B 26%</text>
          <text x="150" y="100" fill="#c6cfdd" font-size="12">Category C 18%</text>
        </svg>
      `;
    }

    function renderTablePreview() {
      return `
        <table class="preview-table">
          <thead><tr><th>device</th><th>area</th><th>status</th><th>last_seen</th></tr></thead>
          <tbody>
            <tr><td>DEV-001</td><td>Line A</td><td style="color:#7bc96f;">ONLINE</td><td>09:31</td></tr>
            <tr><td>DEV-002</td><td>Line B</td><td style="color:#f2c230;">WARN</td><td>09:27</td></tr>
            <tr><td>DEV-003</td><td>Line C</td><td style="color:#ff6b57;">OFFLINE</td><td>09:10</td></tr>
          </tbody>
        </table>
      `;
    }

    function renderPanelVisualization(panel) {
      if (panel.visualization === "stat") {
        const min = Number(panel.min);
        const max = Number(panel.max);
        const lo = Number.isFinite(min) ? min : 0;
        const hi = Number.isFinite(max) && max > lo ? max : lo + 100;
        return `<div class="preview-stat">${escapeHtml(formatValue(lo + (hi - lo) * 0.35, panel.unit))}</div>`;
      }
      if (panel.visualization === "gauge") return renderGaugePreview(panel);
      if (panel.visualization === "piechart") return renderDonutPreview(panel);
      if (panel.visualization === "table") return renderTablePreview(panel);
      return renderTimeSeriesPreview(panel);
    }

    function renderPreview() {
      const board = $("previewBoard");
      const summary = $("previewSummary");
      if (!state.panels.length) {
        summary.textContent = "パネル案作成後に表示されます";
        board.innerHTML = '<div class="empty" style="grid-column: span 24;">ダッシュボード作成前にレイアウトを確認できます。</div>';
        return;
      }
      const positions = previewPositions(state.panels);
      const maxRow = Math.max(...positions.map((pos) => pos.y + pos.h), 10);
      board.style.gridTemplateRows = `repeat(${maxRow}, 24px)`;
      summary.textContent = `${state.panels.length} panels / ${$("folderUid").selectedOptions[0]?.textContent || "General / ルート"}`;
      board.innerHTML = "";
      state.panels.forEach((panel, index) => {
        const pos = positions[index];
        const el = document.createElement("div");
        el.className = "preview-panel";
        el.style.gridColumn = `${pos.x + 1} / span ${pos.w}`;
        el.style.gridRow = `${pos.y} / span ${pos.h}`;
        el.innerHTML = `
          <div class="preview-title">${escapeHtml(panel.title || `Panel ${index + 1}`)}</div>
          <div class="preview-body">${renderPanelVisualization(panel)}</div>
          <div class="preview-meta">${escapeHtml(panel.visualization)} / W:${escapeHtml(panel.warningThreshold ?? "")} / C:${escapeHtml(panel.criticalThreshold ?? "")}</div>
        `;
        board.appendChild(el);
      });
    }

    function renderPanels() {
      renderMeta();
      renderPreview();
      const root = $("panels");
      if (!state.panels.length) {
        root.innerHTML = '<div class="empty">ここにAI提案されたパネル案が表示されます。</div>';
        $("create").disabled = true;
        $("addPanel").disabled = !state.proposal;
        return;
      }

      $("create").disabled = false;
      $("addPanel").disabled = false;
      root.innerHTML = "";

      state.panels.forEach((panel, index) => {
        const card = document.createElement("article");
        card.className = "panel-card";
        card.innerHTML = `
          <div class="panel-head">
            <strong>Panel ${index + 1}</strong>
            <button class="danger" type="button">削除</button>
          </div>
          <label>パネル名</label>
          <input data-key="title" value="${escapeHtml(panel.title)}">
          <div class="meta">
            <div>
              <label>可視化</label>
              <select data-key="visualization">
                ${option("timeseries", "時系列", panel.visualization)}
                ${option("stat", "Stat", panel.visualization)}
                ${option("gauge", "Gauge", panel.visualization)}
                ${option("piechart", "ドーナツ", panel.visualization)}
                ${option("table", "Table", panel.visualization)}
              </select>
            </div>
            <div>
              <label>単位</label>
              <input data-key="unit" value="${escapeHtml(panel.unit)}">
            </div>
            <div>
              <label>最新値のみ</label>
              <select data-key="latestOnly">
                ${option("false", "いいえ", String(Boolean(panel.latestOnly)))}
                ${option("true", "はい", String(Boolean(panel.latestOnly)))}
              </select>
            </div>
          </div>
          <div class="meta two">
            <div>
              <label>最小値</label>
              <input type="number" step="any" data-key="min" value="${panel.min}">
            </div>
            <div>
              <label>最大値</label>
              <input type="number" step="any" data-key="max" value="${panel.max}">
            </div>
          </div>
          <div class="meta two">
            <div>
              <label>Warning 閾値</label>
              <input type="number" step="any" data-key="warningThreshold" value="${panel.warningThreshold ?? ""}">
            </div>
            <div>
              <label>Critical 閾値</label>
              <input type="number" step="any" data-key="criticalThreshold" value="${panel.criticalThreshold ?? ""}">
            </div>
          </div>
          <label>目的</label>
          <textarea data-key="purpose">${escapeHtml(panel.purpose || "")}</textarea>
        `;

        card.querySelector(".danger").addEventListener("click", () => {
          state.panels.splice(index, 1);
          renderPanels();
        });

        card.querySelectorAll("[data-key]").forEach((input) => {
          input.addEventListener("input", () => {
            const key = input.dataset.key;
            const value = key === "latestOnly" ? input.value === "true" : input.value;
            updatePanel(index, key, value);
          });
        });

        root.appendChild(card);
      });
    }

    function option(value, label, selected) {
      return `<option value="${value}" ${value === selected ? "selected" : ""}>${label}</option>`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    $("propose").addEventListener("click", async () => {
      const industry = $("industry").value.trim();
      if (!industry) {
        setStatus("業種を入力してください。", "error");
        return;
      }
      $("propose").disabled = true;
      setStatus("パネル案を作成しています...");
      try {
        const proposal = await api("/api/propose", { industry, dashboardType: $("dashboardType").value });
        state.proposal = proposal;
        state.panels = proposal.panels;
        renderPanels();
        const sourceLabel = proposal.source === "ai" ? "AI生成" : proposal.source === "fallback" ? "汎用テンプレート" : "既知業種テンプレート";
        const warning = proposal.warning ? `\n${proposal.warning}` : "";
        setStatus(`パネル案を作成しました。方式: ${sourceLabel}\n内容を編集してから作成できます。${warning}`, proposal.warning ? "error" : "ok");
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        $("propose").disabled = false;
      }
    });

    $("addPanel").addEventListener("click", () => {
      state.panels.push({
        id: state.panels.length + 1,
        title: "New Sensor Panel",
        visualization: "timeseries",
        unit: "short",
        min: 0,
        max: 100,
        warningThreshold: 80,
        criticalThreshold: 95,
        purpose: "追加センサーの推移を監視",
        latestOnly: false
      });
      renderPanels();
    });

    $("create").addEventListener("click", async () => {
      if (!state.proposal || !state.panels.length) return;
      $("create").disabled = true;
      setStatus("Grafana Cloud にダッシュボードを作成しています...");
      try {
        const result = await api("/api/create-dashboard", {
          industry: $("industry").value.trim(),
          dashboardType: $("dashboardType").value,
          folderUid: $("folderUid").value,
          panels: state.panels,
          overwrite: $("overwriteDashboard").checked
        });
        const label = state.proposal.dashboardType === "iot" ? "IoTデバイス監視ダッシュボード" : "保全用ダッシュボード";
        const status = $("status");
        status.className = "status ok";
        status.innerHTML =
          `名前：${escapeHtml(result.name)}\n\nGrafana Cloud に${escapeHtml($("industry").value.trim())}${label}を作成しました。\nURL:\n<a href="${escapeHtml(result.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(result.url)}</a>`;
      } catch (error) {
        setStatus(error.message, "error");
      } finally {
        $("create").disabled = false;
      }
    });

    $("folderUid").addEventListener("change", () => {
      renderMeta();
      renderPreview();
    });
    loadFolders();
  </script>
</body>
</html>
